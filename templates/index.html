<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector de Emoções em Áudio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🎙️ Detector de Emoções em Áudio</h1>
        <p>Faça o upload de um arquivo de áudio (.wav, .mp3) para que a IA analise a emoção na voz.</p>
        
        <input type="file" id="audioFileInput" accept="audio/*">
        <button id="predictButton">Analisar Emoção</button>
        
        <div id="result" class="result-container">
            </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
